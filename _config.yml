# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 孔明の博客
description: 湖南师范大学 | 计算机视觉
keywords: HPCSIP CV DeepLearning MachineLearning 计算机视觉 深度学习
author: 戈孔明
language: zh-CN
timezone:

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: https://gkm0120.github.io/
# url: https://www.gkm0120.cn
root: /
permalink: p/:abbrlink.html  # 此处可以自己设置，也可以直接使用 :/abbrlink#:year/:month/:day/:title/
permalink_defaults:

abbrlink:
    alg: crc16   #算法： crc16(default) and crc32
    rep: dec     #进制： dec(default) and hex: dec #输出进制：十进制和十六进制，默认为10进制。丨dec为十进制，hex为十六进制

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
- 404.html  #排除 404.html
- README.md

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: true # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: true
  tab_replace:


prism_plugin:
  mode: 'preprocess'    # realtime/preprocess
  theme: 'tomorrow'
  line_number: true    # default false
  custom_css:

search:
  path: search.xml
  field: post
  format: html
  limit: 1000

permalink_pinyin:
  enable: true
  separator: '-' # default: '-'

feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date

Plugins:
- hexo-generator-baidu-sitemap
- hexo-generator-sitemap

baidusitemap:
    path: baidusitemap.xml
sitemap:
    path: sitemap.xml

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 12
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 12
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: hexo-theme-next5-leaf-2.0

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
- type: git
  repo:
    github: https://github.com/gkm0120/gkm0120.github.io.git
    # coding: https://e.coding.net/gkm0120/gkm0120.git
    # gitee: https://gitee.com/gkm0120/gkm0120.git
  branch: master
- type: baidu_url_submitter


# baidu submit
baidu_url_submit:
  count: 80                                      # 提交最新的一个链接
  host: www.gkm0120.cn     # 在百度站长平台中注册的域名
  token: 4o5TLxygfK1F0zhx    # 请注意这是您的秘钥， 所以请不要把博客源代码发布在公众仓库里!
  path: baidu_urls.txt                # 文本文档的地址， 新链接会保存在此文本文档里

live2d:
  enable: false
  scriptFrom: local
  pluginRootPath: live2dw/
  pluginJsPath: lib/
  pluginModelPath: assets/
  tagMode: false
  log: false
  # model:
  #   use: live2d-widget-model-wanko
  model:
    use:
  display:
    position: right
    width: 125
    height: 275
  mobile:
    show: false
  react:
    opacity: 0.7

githubEmojis:
  enable: true
  className: github-emoji
  inject: true
  styles:
    # font-size: 5em
    # font-weight: bold
  customEmojis:

marked:
  gfm: true
  pedantic: false
  breaks: true
  smartLists: true
  smartypants: true
  modifyAnchors: ''
  autolink: true
  sanitizeUrl: false
  headerIds: true

# lazyload configuration  2019.08.14
lazyload:
  enable: false
  onlypost: false # 是否只对文章的图片做懒加载
  loadingImg: https://cdn.jsdelivr.net/gh/gkm0120/CDN/images/2020033003.gif   # eg ./images/loading.gif


# Security
encrypt: # hexo-blog-encrypt
  enable: true
  tags:  # 配置标签加密
    - {name: test, password: test}
    - {name: diary, password: diary}


